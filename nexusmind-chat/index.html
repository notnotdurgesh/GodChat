<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DChat</title>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: 'var(--bg-primary)',
            surface: 'var(--bg-secondary)',
            border: 'var(--border-color)',
            text: {
              primary: 'var(--text-primary)',
              secondary: 'var(--text-secondary)',
            }
          },
          typography: function (theme) {
            return {
              DEFAULT: {
                css: {
                  maxWidth: 'none',
                  color: 'var(--text-primary)',
                  a: {
                    color: theme('colors.blue.500'),
                    '&:hover': {
                      color: theme('colors.blue.600'),
                    },
                  },
                  code: {
                    color: theme('colors.pink.500'),
                  },
                },
              },
              invert: {
                css: {
                  color: 'var(--text-primary)',
                },
              },
            };
          },
          keyframes: {
            shimmer: {
              '0%': { backgroundPosition: '200% 0' },
              '100%': { backgroundPosition: '-200% 0' },
            },
            'snackbar-enter': {
              '0%': { opacity: '0', transform: 'translateY(12px) scale(0.95)' },
              '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
            },
            'snackbar-exit': {
              '0%': { opacity: '1', transform: 'translateY(0) scale(1)' },
              '100%': { opacity: '0', transform: 'translateY(-8px) scale(0.95)' },
            },
            dash: {
              '0%': { strokeDashoffset: '0' },
              '100%': { strokeDashoffset: '-20' },
            }
          },
          animation: {
            shimmer: 'shimmer 2s linear infinite',
            'snackbar-enter': 'snackbar-enter 0.3s ease-out',
            'snackbar-exit': 'snackbar-exit 0.3s ease-in forwards',
            dash: 'dash 1s linear infinite',
          }
        }
      }
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
  <style>
    :root {
      /* Light Mode */
      --bg-primary: #ffffff;
      --bg-secondary: #f9fafb;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --border-color: #e5e7eb;
      --accent-primary: #2563eb;
    }

    :root.dark {
      /* Dark Mode: Obsidian/Gemini style */
      --bg-primary: #131314;
      --bg-secondary: #1e1f20;
      --text-primary: #e3e3e3;
      --text-secondary: #a8abb8;
      --border-color: #2d2e35;
      --accent-primary: #4c8bfa;
    }

    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation: none;
      mix-blend-mode: normal;
    }

    body {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }

    .cyber-grid {
      background-size: 40px 40px;
      background-image: linear-gradient(to right, rgba(128, 128, 128, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(128, 128, 128, 0.05) 1px, transparent 1px);
      mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
      pointer-events: none;
    }

    /* Premium Animations */
    @keyframes shimmer-text {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .shimmer-text {
      background: linear-gradient(90deg, 
        var(--text-primary) 0%, 
        var(--accent-primary) 25%, 
        var(--text-primary) 50%, 
        var(--accent-primary) 75%, 
        var(--text-primary) 100%);
      background-size: 200% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shimmer-text 6s linear infinite;
    }

    @keyframes border-shimmer {
      0% { border-color: var(--border-color); }
      50% { border-color: var(--accent-primary); shadow: 0 0 15px var(--accent-primary); }
      100% { border-color: var(--border-color); }
    }

    .glass-input {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .dark .glass-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .glass-input:focus-within {
      background: rgba(255, 255, 255, 0.07);
      border-color: var(--accent-primary);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2), 0 0 0 1px var(--accent-primary);
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }

    .float-animation {
      animation: float 4s ease-in-out infinite;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react": "https://esm.sh/react@18.2.0",
    "react/": "https://esm.sh/react@18.2.0/",
    "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
    "react-dom": "https://esm.sh/react-dom@18.2.0?deps=react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?deps=react@18.2.0",
    "react-dom/server": "https://esm.sh/react-dom@18.2.0/server?deps=react@18.2.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "d3": "https://esm.sh/d3@^7.9.0",
    "uuid": "https://esm.sh/uuid@^13.0.0",
    "react-syntax-highlighter": "https://esm.sh/react-syntax-highlighter@^15.5.0?deps=react@18.2.0",
    "react-textarea-autosize": "https://esm.sh/react-textarea-autosize@^8.5.5?deps=react@18.2.0",
    "react-markdown": "https://esm.sh/react-markdown@^9.0.1?deps=react@18.2.0",
    "remark-gfm": "https://esm.sh/remark-gfm@^4.0.0",
    "remark-math": "https://esm.sh/remark-math@^6.0.0",
    "remark-sub-super": "https://esm.sh/remark-sub-super@^1.0.0",
    "rehype-katex": "https://esm.sh/rehype-katex@^7.0.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
